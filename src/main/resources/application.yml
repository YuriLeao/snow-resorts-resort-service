spring:
  application:
    name: resort-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/snow_resorts?currentSchema=resorts}
    username: ${DB_USER:snow}
    password: ${DB_PASSWORD:snow}
    hikari:
      # currentSchema=resorts alone hides PostGIS types/functions in public; native spatial
      # queries (ST_DWithin, ::geography) need both schemas on every pooled connection.
      connection-init-sql: SET search_path TO resorts, public
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: resorts
        # hibernate-spatial auto-registers PostGIS spatial types on the standard
        # PostgreSQL dialect in Hibernate 6 (the old PostgisDialect class was removed).
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: resorts
    default-schema: resorts
    create-schemas: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

server:
  port: ${SERVER_PORT:8083}
  forward-headers-strategy: framework

snow:
  security:
    public-paths:
      - /snow-resort-service/v1/resorts
      - /snow-resort-service/v1/resorts/**
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGIN:http://localhost:8080}
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}
  internal-api:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret}
    header: X-Internal-Secret

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.snowresorts.resort: INFO
