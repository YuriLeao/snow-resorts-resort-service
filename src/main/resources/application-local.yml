# Local dev profile ($0). Connects to the Docker Compose Postgres/PostGIS started by `make dev`.
spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/snow_resorts?currentSchema=resorts
    username: snow
    password: snow
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{request_id}] %logger{36} - %msg%n"
  level:
    com.snowresorts.resort: DEBUG
